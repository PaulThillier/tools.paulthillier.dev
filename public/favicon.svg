<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Inward emerald stroke effect via a gradient/glow on the inside -->
    <linearGradient id="strokeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="strokeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="strokeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="strokeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Background: near-black -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="#0a0a0a"/>

  <!-- Inward emerald glow strokes (painted inside via clip) -->
  <g clip-path="url(#roundedClip)">
    <!-- Top edge glow -->
    <rect x="0" y="0" width="512" height="60" fill="url(#strokeTop)" opacity="0.85"/>
    <!-- Bottom edge glow -->
    <rect x="0" y="452" width="512" height="60" fill="url(#strokeBottom)" opacity="0.85"/>
    <!-- Left edge glow -->
    <rect x="0" y="0" width="60" height="512" fill="url(#strokeLeft)" opacity="0.85"/>
    <!-- Right edge glow -->
    <rect x="452" y="0" width="60" height="512" fill="url(#strokeRight)" opacity="0.85"/>
  </g>

  <!-- Outer rounded border stroke -->
  <rect x="8" y="8" width="496" height="496" rx="94" ry="94" fill="none" stroke="#10b981" stroke-width="6" opacity="0.9"/>

  <!-- PT/ text -->
  <text
    x="256"
    y="310"
    text-anchor="middle"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="192"
    font-weight="700"
    letter-spacing="-4"
    fill="#10b981"
  >PT/</text>
</svg>
